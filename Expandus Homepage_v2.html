fr 0.85fr;gap:24px;margin-bottom:24px;align-items:stretch\">\n        <div style=\"background: var(--surface-section); border-radius: var(--radius-lg); padding: 32px 36px; display: flex; flex-direction: column; justify-content: center\">\n          <svg width=\"40\" height=\"32\" viewBox=\"0 0 40 32\" fill=\"#B65A4B\" style=\"margin-bottom:18px;opacity:0.9\"><path d=\"M0 20.8C0 27 3.6 31.2 10.4 32l1.2-2.4C7.6 28.4 5.6 25.8 5.2 22.4H10.4V8H0V20.8ZM22 20.8C22 27 25.6 31.2 32.4 32l1.2-2.4C29.6 28.4 27.6 25.8 27.2 22.4H32.4V8H22V20.8Z\"><\u002Fpath><\u002Fsvg>\n          <blockquote style=\"font-family: Gordita; font-size: 16px; line-height: var(--leading-normal); color: var(--text-heading); margin: 0 0 24px; font-weight: 400; letter-spacing: var(--tracking-snug)\">I had the pleasure of working with Mr. Bibikar over the past few months. He possesses an exceptional ability to identify and address key business challenges with strategic insights and practical solutions. Mr. Bibikar brings a wealth of experience in the capital goods manufacturing sector. He helped establish few vital practices in our organisation and engaging him has brought positive changes in our organisation. I wholeheartedly endorse his expertise to anyone seeking transformative business coaching.<\u002Fblockquote>\n          <div style=\"display:flex;align-items:center;gap:14px\">\n            <x-import component-from-global-scope=\"image-slot\" id=\"story-avatar\" shape=\"circle\" placeholder=\"Photo\" style=\"width:56px;height:56px\" hint-size=\"56px,56px\"><\u002Fx-import>\n            <div>\n              <div style=\"font-family: var(--font-display); font-weight: 700; color: var(--text-heading); font-size: 16px\">Client name<\u002Fdiv>\n              <div style=\"font-size:13px;color:var(--text-muted-aa)\">Founder &amp; CEO, Company<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Video testimonial: full-height, overlay client info like industry cards -->\n        <div style=\"position:relative;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-gray-200);min-height:100%\">\n          <x-import component-from-global-scope=\"image-slot\" id=\"video-1\" shape=\"rect\" placeholder=\"Video testimonial\" style=\"width:100%;height:100%;min-height:360px\" hint-size=\"100%,100%\"><\u002Fx-import>\n          <!-- dark gradient overlay (bottom) -->\n          <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(34,19,49,0.88) 0%,rgba(34,19,49,0.35) 45%,transparent 70%);pointer-events:none\"><\u002Fdiv>\n          <!-- play button (centred) -->\n          <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none\">\n            <span style=\"width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md)\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#4A3A6A\"><polygon points=\"6 4 20 12 6 20 6 4\"><\u002Fpolygon><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fdiv>\n          <!-- client info overlay at bottom -->\n          <div style=\"position:absolute;left:0;right:0;bottom:0;padding:24px 28px;pointer-events:none\">\n            <div style=\"font-family:var(--font-display);font-weight:700;color:#fff;font-size:16px;margin-bottom:4px\">Client name<\u002Fdiv>\n            <div style=\"font-size:13px;color:rgba(255,255,255,0.72)\">Founder &amp; CEO, Company<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-radius: var(--radius-lg); padding: 26px 30px; background-color: var(--color-white)\">\n        <div style=\"font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted-aa);text-align:center;margin-bottom:18px\">Trusted by ambitious founders<\u002Fdiv>\n        <div class=\"exp-logos\" style=\"display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:18px;align-items:center\">\n          <x-import component-from-global-scope=\"image-slot\" id=\"logo-1\" shape=\"rect\" placeholder=\"Logo\" style=\"width:100%;height:54px\" hint-size=\"100%,54px\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"image-slot\" id=\"logo-2\" shape=\"rect\" placeholder=\"Logo\" style=\"width:100%;height:54px\" hint-size=\"100%,54px\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"image-slot\" id=\"logo-3\" shape=\"rect\" placeholder=\"Logo\" style=\"width:100%;height:54px\" hint-size=\"100%,54px\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"image-slot\" id=\"logo-4\" shape=\"rect\" placeholder=\"Logo\" style=\"width:100%;height:54px\" hint-size=\"100%,54px\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"image-slot\" id=\"logo-5\" shape=\"rect\" placeholder=\"Logo\" style=\"width:100%;height:54px\" hint-size=\"100%,54px\"><\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"text-align:center;margin-top:40px\">\n        <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" variant=\"secondary\" hint-size=\"auto,44px\">View Success Stories<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 9 — RESOURCES ============ -->\n  <section id=\"resources\" style=\"padding: var(--space-4xl) 0; background-color: #f7f4f8\">\n    <div style=\"max-width:1400px;margin:0 auto;padding:0 24px\">\n      <div data-reveal=\"\" style=\"text-align:center;max-width:680px;margin:0 auto 44px\">\n        <div style=\"font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--color-coral);margin-bottom:12px\">Resources<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-size:var(--text-h3);line-height:var(--lh-h3);letter-spacing:var(--tracking-tight);font-weight:var(--weight-bold);color:var(--text-heading);margin:0\">Insights for growth-minded founders.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"exp-resources\" style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:18px\">\n        <sc-for list=\"{{ resources }}\" as=\"res\" hint-placeholder-count=\"5\">\n          <div data-reveal=\"\" style=\"background:#fff;border:1px solid var(--color-gray-200);border-radius:var(--radius-lg);padding:24px 22px;display:flex;flex-direction:column\" style-hover=\"transform:translateY(-3px);box-shadow:var(--shadow-md)\">\n            <div style=\"width:46px;height:46px;border-radius:6px;background:var(--color-purple-tint);display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4A3A6A\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"><\u002Fpath><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h3 style=\"font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-bold);color:var(--text-heading);margin:0 0 8px\">{{ res.kind }}<\u002Fh3>\n            <p style=\"font-size: 16px; line-height: 1.55; color: var(--text-muted-aa); margin: 0 0 16px; flex: 1\">{{ res.desc }}<\u002Fp>\n            <span style=\"display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 0.04em; color: var(--color-primary)\">Explore<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"text-align:center;margin-top:40px\">\n        <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" variant=\"secondary\" hint-size=\"auto,44px\">Explore Resources<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 10 — FINAL CTA ============ -->\n  <section id=\"final\" style=\"position:relative;background:radial-gradient(800px 500px at 80% 100%,rgba(182,90,75,0.4),transparent 60%),linear-gradient(150deg,#2F2A3A,#423862);padding:96px 0;overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 50%,transparent 100%);mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 50%,transparent 100%);pointer-events:none\"><\u002Fdiv>\n    <div style=\"position: relative; margin: 0 auto; text-align: center\">\n      \n      <h2 class=\"exp-h2-44\" style=\"font-family:var(--font-display);font-size:var(--text-h2);line-height:var(--lh-h2);letter-spacing:var(--tracking-tight);font-weight:var(--weight-bold);color:#fff;margin:0 0 16px\">Ready to move the Red Dot™?<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.7;color:rgba(255,255,255,0.78);margin:0 auto 32px;max-width:560px\">Discover where your business is today, identify what is holding it back, and build a roadmap for scalable growth.<\u002Fp>\n      <div class=\"exp-cta-btns\" style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n        <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" size=\"lg\" on-click=\"{{ goJourney }}\" hint-size=\"auto,52px\">Take The Business Maturity Diagnostic™<\u002Fx-import>\n        <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" variant=\"outline-white\" size=\"lg\" hint-size=\"auto,52px\">Book A Strategy Session<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:var(--color-plum);padding:60px 0 34px\">\n    <div class=\"exp-footer\" style=\"max-width:1400px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px\">\n      <div>\n        <img src=\"3b977e0b-8cdb-49cf-9a81-d9167f5c5978\" alt=\"Expandus\" style=\"height:34px;width:auto;display:block;margin-bottom:16px\">\n        <p style=\"font-size:14px;line-height:1.7;color:rgba(255,255,255,0.7);margin:0 0 18px;max-width:300px\">We help entrepreneurs build profitable, scalable, self-sustaining businesses — and navigate the journey from where they are today to where they truly want to be.<\u002Fp>\n        <div style=\"font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-coral)\">Framework for Success<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; margin: 0 0 16px\">The Theory<\u002Fh4>\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <a href=\"#theory\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Red Dot Theory™<\u002Fa>\n          <a href=\"#journey\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Your Red Dot Stage™<\u002Fa>\n          <a href=\"#journey\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">The Six Stages<\u002Fa>\n          <a href=\"#final\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Maturity Diagnostic™<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; margin: 0 0 16px\">Company<\u002Fh4>\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <a href=\"#whatwedo\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">What We Do<\u002Fa>\n          <a href=\"#industries\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Industries<\u002Fa>\n          <a href=\"#approach\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Our Approach<\u002Fa>\n          <a href=\"#stories\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Success Stories<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; margin: 0 0 16px\">Engage<\u002Fh4>\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <a href=\"#events\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Events &amp; Webinars<\u002Fa>\n          <a href=\"#resources\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Resources<\u002Fa>\n          <a href=\"#final\" style=\"font-size:14px;color:rgba(255,255,255,0.7);text-decoration:none\" style-hover=\"color:#fff\">Book A Scale Session<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:36px auto 0;padding-top:22px;border-top:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n      <span style=\"font-size: 14px; color: rgba(255,255,255,0.5)\">© 2026 Expandus Business Coaching. ActionCOACH India Partner.<\u002Fspan>\n      <span style=\"font-size: 14px; color: rgba(255,255,255,0.5)\">Real coaches, real people, real results.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n\n\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { openStage: 0, journeyStage: 0, approachStep: 0 };\n\n  STAGES = [\n    { num:1, role:'The Origin', tag:'Survival', descriptor:'The founder is the business.',\n      desc:\"You are the business. There is no separation between your effort and the company's output. Every customer interaction, every delivery, every decision passes through you. It is the most personal stage and the most fragile. Your energy is the only engine — if you stop, the business stops.\",\n      signals:['You handle everything yourself','No team, or a team that exists only to assist you directly','Decisions cannot be made without you','Revenue is entirely tied to your personal output'],\n      note:\"You haven't built a business yet. You have created a source of income, but not yet a scalable business.\",\n      investible:false },\n    { num:2, role:'The Manager', tag:'Controlled Chaos', descriptor:\"The founder is at the centre of a team that's starting to form.\",\n      desc:\"You're still doing the work, but have started hiring. Every conversation, every approval, every escalation still comes back to you. You secretly wish you hadn't hired people — it feels like the work could have been done faster alone — but you know you can't do it all by yourself.\",\n      signals:['Team members regularly wait for your input before acting','Your inbox and calendar are permanently overwhelmed','Everyone expects you to have the answers, even when the questions keep changing','You are a trainer and a doer at the same time','Decisions stall when you are unavailable','You feel like you are managing people rather than leading a business'],\n      note:\"This is where most growing businesses get stuck. Having a team does not mean you have delegated leadership.\",\n      investible:false },\n    { num:3, role:'The Strain', tag:'Founder Bottleneck', descriptor:'Growth is here, but everything still runs through you.',\n      desc:\"Your business is growing and money is coming in, but it does not feel like it. You are still selling AND delivering, so when you focus on one, the other suffers. Your team is there, but every decision still comes back to you. You are working harder than ever but feel stuck. The business has been built to depend on you for everything — and that design is what needs to change.\",\n      signals:['You know you need to let go, but struggle to','Some decisions are delegated, but accountability is inconsistent','The business has outgrown your ability to manage everything personally','You feel the tension between control and growth'],\n      note:\"Most founders reach this line and pull back. Crossing it is the defining moment in building a scalable business.\",\n      investible:false },\n    { num:4, role:'The Graduation', tag:'Organisational Scale', descriptor:'You orchestrate; you no longer run every function yourself.',\n      desc:\"You are no longer the centre. Leaders exist within your team. Decisions happen without you in the room. Your role shifts to strategy, alignment, and coaching your leaders — not managing daily operations. The business starts to breathe on its own for the first time. But you still have to make the shift from 'my company' to 'our company'.\",\n      signals:['Leaders are beginning to make decisions independently, though they still look to you for confidence in critical moments','You are consulted, not required, for most operational matters','The business continues to function well when you are away','Your energy goes into direction, not delivery'],\n      note:\"When your team stops waiting for you — that is Stage 4. It should feel uncomfortable at first. That discomfort is progress.\",\n      investible:false },\n    { num:5, role:'The Architect', tag:'Enterprise Evolution', descriptor:'You design the system instead of running it.',\n      desc:\"You've moved from being inside the machine to building the machine. Your value is now in the structures, culture, and accountability frameworks you create — not in the day-to-day decisions you make. The organisation runs on its own logic, not on your presence.\",\n      signals:['The business has documented systems and clear accountability structures','Culture and performance standards exist independently of you','You spend most of your time on strategy and capability-building','Investors or potential acquirers would see a business, not a person'],\n      note:\"You stop being the answer to every problem. You become the person who ensures the right questions are asked — and the right people answer them.\",\n      investible:true },\n    { num:6, role:'The Chairman', tag:'Legacy & Impact', descriptor:'You step back into a board-level role.',\n      desc:\"You operate like an investor or board member within your own company. Day-to-day operations do not require you. The business is no longer founder-dependent — it is investible, scalable, and self-sustaining. Your focus is long-term vision, capital allocation, and strategic direction.\",\n      signals:['The business runs and grows without your daily involvement','A leadership team manages operations, culture, and performance','Your CXO team is now fully functional','The company value is independent of any single person','You are free to focus on what only you can do at the highest level'],\n      note:\"This is not disappearance — it is mastery. You have moved from being the system to designing the system.\",\n      investible:true },\n  ];\n\n  TRANSFORMS = [\n    { from:'Founder', to:'Leader', desc:'Evolve from doing everything to leading what matters.' },\n    { from:'Chaos', to:'Clarity', d
