  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"5b5ec303-0726-4eed-979f-740e3345a716\"><\u002Fscript>\n  <!-- Bundler: inline the DS bundle and image-slot (referenced by JS strings) -->\n  \n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ─────────────────────────────────────────────\n   Expandus — Color tokens  (v2 palette — June 2026)\n   Brand refresh aligned to The Red Dot Theory™:\n     • Refined Plum Purple #4A3A6A — primary brand & actions\n     • Muted Terracotta Red #B65A4B — accent / energy\n     • Deep Charcoal Plum  #2F2A3A — headings & dark anchor\n     • Soft Lavender White  #F7F4F8 — page background\n     • Light Lavender Gray  #EFE8F2 — section background\n     • Soft Copper          #C9826B — CTA hover state\n   Legacy alias names (--color-orange*, --color-navy*) are retained so\n   existing component references cascade automatically.\n   ───────────────────────────────────────────── */\n:root {\n  /* ── Base brand palette ── */\n  --color-purple:        #4A3A6A;  /* primary — Refined Plum Purple */\n  --color-purple-hover:  #C9826B;  /* CTA hover — Soft Copper */\n  --color-purple-tint:   #EDE8F5;  /* faint plum wash */\n  --color-coral:         #B65A4B;  /* accent — Muted Terracotta Red */\n  --color-coral-hover:   #9A4A3D;  /* darker terracotta */\n  --color-coral-tint:    #F7EDEB;  /* faint terracotta wash */\n  --color-plum:          #2F2A3A;  /* Deep Charcoal Plum — dark anchor */\n  --color-plum-soft:     #3D3550;  /* raised surface on plum */\n  --color-white:         #FFFFFF;\n\n  /* Neutral ramp */\n  --color-gray-50:       #F7F7F7;\n  --color-gray-100:      #EEEEEE;\n  --color-gray-200:      #E0E0E0;\n  --color-gray-300:      #DDDDDD;\n  --color-gray-500:      #888888;\n  --color-gray-600:      #666666;\n  --color-gray-700:      #5C5C5C;  /* logo tagline gray */\n  --color-gray-900:      #222222;\n\n  /* ── Legacy aliases (do not remove — referenced across components) ── */\n  --color-orange:        var(--color-purple);        /* legacy → primary (purple) */\n  --color-orange-hover:  var(--color-purple-hover);\n  --color-orange-tint:   var(--color-purple-tint);\n  --color-navy:          var(--color-plum);          /* legacy → dark (plum) */\n  --color-navy-soft:     var(--color-plum-soft);\n\n  /* ── Semantic: brand ── */\n  --color-primary:       var(--color-purple);\n  --color-primary-hover: var(--color-purple-hover);\n  --color-accent:        var(--color-coral);\n  --color-accent-hover:  var(--color-coral-hover);\n  --color-accent-tint:   var(--color-coral-tint);\n  --color-dark:          var(--color-plum);\n\n  /* ── Semantic: surfaces ── */\n  --surface-page:        #F7F4F8;   /* Soft Lavender White */\n  --surface-section:     #EFE8F2;   /* Light Lavender Gray */\n  --surface-card:        var(--color-white);\n  --surface-mid:         var(--color-gray-100);\n  --surface-dark:        var(--color-plum);\n  --surface-dark-soft:   var(--color-plum-soft);\n  --overlay-scrim:       rgba(0, 0, 0, 0.55);\n  --overlay-orange:      rgba(182, 90, 75, 0.62);    /* legacy name; terracotta hover overlay */\n  --overlay-accent:      rgba(182, 90, 75, 0.62);\n\n  /* ── Semantic: text ── */\n  --text-heading:        var(--color-plum);\n  --text-body:           #444444;\n  --text-muted:          var(--color-gray-500);\n  --text-muted-aa:       var(--color-gray-600);  /* AA-safe muted for <18px */\n  --text-on-dark:        var(--color-white);\n  --text-on-dark-soft:   rgba(255, 255, 255, 0.75);\n  --text-link:           var(--color-purple);\n  --text-link-hover:     var(--color-purple-hover);\n\n  /* ── Semantic: borders ── */\n  --border-default:      var(--color-gray-200);\n  --border-divider:      var(--color-gray-300);\n  --border-focus:        var(--color-purple);\n  --border-on-dark:      rgba(255, 255, 255, 0.16);\n\n  /* ── Status ── */\n  --color-success:       #28A745;\n  --color-warning:       #FFC107;\n  --color-error:         #DC3545;\n  --focus-ring:          0 0 0 3px rgba(74, 58, 106, 0.20);\n}\n<\u002Fstyle>\n  <style>/* ════════════════════════════════════════════════════════════════\n   Expandus — Typography tokens\n   Headings: Montserrat · Body: Gordita (Mulish substitute)\n   Role-based, responsive scale aligned to an 8px grid.\n   Sizes + line-heights are exposed as CSS variables and re-declared\n   at tablet/mobile breakpoints so type reflows automatically.\n   Breakpoints:  tablet ≤ 1024px · mobile ≤ 640px\n   ════════════════════════════════════════════════════════════════ */\n:root {\n  /* ── Families ── */\n  --font-display: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-body:    'Gordita', 'Mulish', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-mono:    'Courier New', Courier, monospace;\n\n  /* ════ ROLE SCALE — Desktop (default) ════ */\n  /* Headings (Montserrat) */\n  --text-h1: 56px;  --lh-h1: 64px;\n  --text-h2: 48px;  --lh-h2: 56px;\n  --text-h3: 40px;  --lh-h3: 48px;\n  --text-h4: 32px;  --lh-h4: 40px;\n  --text-h5: 24px;  --lh-h5: 32px;\n  --text-h6: 16px;  --lh-h6: 24px;\n\n  /* Body & UI (Gordita) */\n  --text-body-lg: 16px;  --lh-body-lg: 24px;   /* Body large */\n  --text-body:    14px;  --lh-body:    22px;   /* Body regular */\n  --text-body-sm: 13px;  --lh-body-sm: 20px;   /* Body small */\n  --text-button:  14px;  --lh-button:  20px;   /* CTA / Button — same size as Body Regular, weight 700 */\n  --text-caption: 13px;  --lh-caption: 20px;   /* Caption / eyebrow */\n\n  /* ── Pill tokens — unified pill/badge component ── */\n  --text-pill:   13px;   /* desktop + tablet */\n  --lh-pill:     18px;\n  --pad-pill:    6px 12px;\n  --radius-pill: 999px;\n  --weight-pill: 600;\n  --gap-pill:    6px;\n\n  /* ── CTA rule (alias tokens for explicit brand docs) ── */\n  --weight-cta: 700;   /* all CTAs: bold — no semibold, no uppercase */\n\n  /* ── Weights ── */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* ── Line heights (unitless, legacy/utility) ── */\n  --leading-tight:   1.2;\n  --leading-snug:    1.4;\n  --leading-normal:  1.6;\n  --leading-relaxed: 1.7;\n\n  /* ── Letter spacing ── */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.05em;   /* eyebrows / overlines (not buttons) */\n  --tracking-wider:  0.1em;    /* all-caps labels */\n\n  /* ── Legacy step scale (kept for dense UI / back-compat) ──\n     Micro UI (badges, tiny labels) intentionally stays below the\n     16px role floor for density. */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-lg:   18px;\n  --text-xl:   20px;\n  --text-2xl:  24px;\n  --text-3xl:  32px;\n  --text-4xl:  42px;\n  --text-5xl:  56px;\n}\n\n/* ════ Tablet ≤ 1024px ════ */\n@media (max-width: 1024px) {\n  :root {\n    --text-h1: 48px;  --lh-h1: 56px;\n    --text-h2: 40px;  --lh-h2: 48px;\n    --text-h3: 32px;  --lh-h3: 40px;\n    --text-h4: 24px;  --lh-h4: 32px;\n    --text-h5: 20px;  --lh-h5: 28px;\n    --text-h6: 16px;  --lh-h6: 24px;\n    --text-body-lg: 16px;  --lh-body-lg: 24px;\n  }\n}\n\n/* ════ Tablet ≤ 1024px — pill stays 13px/18px, padding slightly tighter ════ */\n@media (max-width: 1024px) {\n  :root {\n    --pad-pill: 5px 10px;\n  }\n}\n\n/* ════ Mobile ≤ 640px ════ */\n@media (max-width: 640px) {\n  :root {\n    --text-pill: 12px;\n    --lh-pill:   16px;\n    --pad-pill:  5px 10px;\n    --text-h1: 40px;  --lh-h1: 48px;\n    --text-h2: 32px;  --lh-h2: 40px;\n    --text-h3: 24px;  --lh-h3: 32px;\n    --text-h4: 20px;  --lh-h4: 28px;\n    --text-h5: 18px;  --lh-h5: 26px;\n    --text-h6: 16px;  --lh-h6: 24px;\n    --text-body-lg: 15px;  --lh-body-lg: 24px;\n  }\n}\n<\u002Fstyle>\n  <style>/* ─────────────────────────────────────────────\n   Expandus — Spacing, radius, layout tokens\n   8px base grid.\n   ───────────────────────────────────────────── */\n:root {\n  /* Spacing (8px base) */\n  --space-xs:  4px;\n  --space-sm:  8px;\n  --space-md:  16px;\n  --space-lg:  24px;\n  --space-xl:  32px;\n  --space-2xl: 48px;\n  --space-3xl: 64px;\n  --space-4xl: 80px;\n  --space-5xl: 100px;\n\n  /* ── Radius scale ── */\n  --radius-sm:   8px;    /* small tags, icon buttons, compact UI */\n  --radius-md:   12px;   /* buttons, CTAs, form fields, small cards */\n  --radius-lg:   16px;   /* main cards, feature cards, section cards */\n  --radius-xl:   24px;   /* hero visuals, large panels, premium sections */\n  --radius-pill: 999px;  /* pills, badges, tags — never use on cards/buttons */\n\n  /* ── Semantic radius aliases ── */\n  --radius-card: var(--radius-lg);   /* all content cards */\n  --radius-cta:  var(--radius-md);   /* all CTA / button elements */\n  --radius-form: var(--radius-md);   /* inputs, selects, textareas */\n  --radius-icon: var(--radius-sm);   /* icon buttons, compact controls */\n\n  /* Layout */\n  --container-narrow: 860px;\n  --container-max:    1200px;\n  --container-wide:   1400px;\n  --header-height:    72px;\n\n  /* Z-index */\n  --z-base:     0;   /* @kind other */\n  --z-raised:   10;  /* @kind other */\n  --z-dropdown: 100; /* @kind other */\n  --z-sticky:   200; /* @kind other */\n  --z-overlay:  300; /* @kind other */\n  --z-modal:    400; /* @kind other */\n  --z-toast:    500; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ─────────────────────────────────────────────\n   Expandus — Shadows & transitions\n   Brand-tinted soft shadows (plum undertone). No heavy glows.\n   All shadows use rgba(16,10,35,…) — the plum colour dark anchor.\n   ───────────────────────────────────────────── */\n:root {\n  /* ── Primitive shadow scale ── */\n  --shadow-sm: 0 2px 8px  rgba(16, 10, 35, 0.06);\n  --shadow-md: 0 4px 16px rgba(16, 10, 35, 0.08);\n  --shadow-lg: 0 8px 24px rgba(16, 10, 35, 0.10);\n  --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.18);\n\n  /* ── Semantic shadow aliases (use these in components) ── */\n  --shadow-soft:         0 8px 24px  rgba(16, 10, 35, 0.08);  /* card default */\n  --shadow-hover:        0 12px 32px rgba(16, 10, 35, 0.12);  /* card hover lift */\n  --shadow-dark-section: 0 12px 32px rgba(0, 0, 0, 0.18);     /* on dark bg */\n\n  /* Dropdown / popover */\n  --shadow-pop: 0 8px 24px rgba(16, 10, 35, 0.12);\n\n  --transition-fast:   all 0.15s ease; /* @kind other */\n  --transition-normal: all 0.2s ease;  /* @kind other */\n  --transition-slow:   all 0.3s ease;  /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ════════════════════════════════════════════════════════════════\n   Expandus — Global base typography\n   Applies the role-based, responsive type scale to real elements so\n   any page linking styles.css gets correct heading/body sizing for\n   free. All sizes/line-heights come from the responsive tokens in\n   typography.css, so these reflow at tablet/mobile automatically.\n   ════════════════════════════════════════════════════════════════ */\n\n/* Box sizing + no horizontal overflow on any screen */\n*, *::before, *::after { box-sizing: border-box; }\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  font-weight: var(--weight-regular);\n  color: #444444;                /* body text color (avoids --text-body size-token collision) */\n  overflow-x: hidden;            /* prevent horizontal scroll */\n}\n\n/* Headings — Montserrat */\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  color: var(--text-heading);\n  margin: 0 0 0.5em;\n  font-weight: var(--weight-bold);\n  text-wrap: balance;            /* avoid awkward heading wraps */\n  overflow-wrap: break-word;     /* prevent long-word overflow */\n}\nh1 { font-size: var(--text-h1); line-height: var(--lh-h1); letter-spacing: var(--tracking-tight); }\nh2 { font-size: var(--text-h2); line-height: var(--lh-h2); letter-spacing: var(--tracking-snug); font-weight: var(--weight-semibold); }\nh3 { font-size: var(--text-h3); line-height: var(--lh-h3); letter-spacing: var(--tracking-snug); font-weight: var(--weight-semibold); }\nh4 { font-size: var(--text-h4); line-height: var(--lh-h4); font-weight: var(--weight-semibold); }\nh5 { font-size: var(--text-h5); line-height: var(--lh-h5); font-weight: var(--weight-semibold); }\nh6 { font-size: var(--text-h6); line-height: var(--lh-h6); font-weight: var(--weight-semibold); }\n\n/* Body copy — Gordita */\np { margin: 0 0 1em; font-size: var(--text-body); line-height: var(--lh-body); text-wrap: pretty; overflow-wrap: break-word; }\n.text-body-lg, .lead { font-size: var(--text-body-lg); line-height: var(--lh-body-lg); }\n.text-body-sm, small { font-size: var(--text-body-sm); line-height: var(--lh-body-sm); }\n\n/* UI roles */\nbutton, input, select, textarea, label { font-family: var(--font-body); }\nbutton, .button-text { font-size: var(--text-button); line-height: var(--lh-button); font-weight: var(--weight-cta); text-transform: none; letter-spacing: normal; }\n.caption, .eyebrow { font-size: var(--text-caption); line-height: var(--lh-caption); }\n\nimg, svg, video { max-width: 100%; height: auto; }\n<\u002Fstyle>\n  <style>/* ════════════════════════════════════════════════════════════════\n   Expandus Design System — global entry point.\n   Consumers link THIS file. Imports only; no rules live here.\n   ════════════════════════════════════════════════════════════════ */\n/* Expandus webfonts.\n   ── Headings: Montserrat (Google Fonts)\n   ── Body:     Gordita  ← brand body face (commercial, NOT on Google Fonts)\n\n   Gordita is declared below via @font-face with a local() source, so it is\n   used for anyone who has Gordita installed. Everyone else falls back to\n   Mulish (loaded from Google Fonts) — the closest geometric-humanist match\n   — via the 'Gordita', ' d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4fbe2b17-fb9c-46af-8f45-03737c104f02\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ccc11404-49aa-425a-895d-75d19f5d8601\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a2d40d27-c5d1-4497-a03b-66f90bc352c7\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"92ba00d3-adad-4d28-bd62-abd21cf4246a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8ce7ca5c-3c0a-4c3d-b471-0526066065dd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: 'Gordita';\n  src: url(\"7aa4ac9e-5aae-4405-aed5-8753d878f9da\") format('truetype'),\n       local('Gordita'), local('Gordita-Regular'), local('Gordita Regular');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Gordita';\n  src: local('Gordita Medium'), local('Gordita-Medium');\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Gordita';\n  src: local('Gordita SemiBold'), local('Gordita-Bold'), local('Gordita Bold');\n  font-weight: 600 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n\n/* ─────────────────────────────────────────────\n   Expandus — Color tokens  (v2 palette — June 2026)\n   Brand refresh aligned to The Red Dot Theory™:\n     • Refined Plum Purple #4A3A6A — primary brand & actions\n     • Muted Terracotta Red #B65A4B — accent / energy\n     • Deep Charcoal Plum  #2F2A3A — headings & dark anchor\n     • Soft Lavender White  #F7F4F8 — page background\n     • Light Lavender Gray  #EFE8F2 — section background\n     • Soft Copper          #C9826B — CTA hover state\n   Legacy alias names (--color-orange*, --color-navy*) are retained so\n   existing component references cascade automatically.\n   ───────────────────────────────────────────── */\n:root {\n  /* ── Base brand palette ── */\n  --color-purple:        #4A3A6A;  /* primary — Refined Plum Purple */\n  --color-purple-hover:  #C9826B;  /* CTA hover — Soft Copper */\n  --color-purple-tint:   #EDE8F5;  /* faint plum wash */\n  --color-coral:         #B65A4B;  /* accent — Muted Terracotta Red */\n  --color-coral-hover:   #9A4A3D;  /* darker terracotta */\n  --color-coral-tint:    #F7EDEB;  /* faint terracotta wash */\n  --color-plum:          #2F2A3A;  /* Deep Charcoal Plum — dark anchor */\n  --color-plum-soft:     #3D3550;  /* raised surface on plum */\n  --color-white:         #FFFFFF;\n\n  /* Neutral ramp */\n  --color-gray-50:       #F7F7F7;\n  --color-gray-100:      #EEEEEE;\n  --color-gray-200:      #E0E0E0;\n  --color-gray-300:      #DDDDDD;\n  --color-gray-500:      #888888;\n  --color-gray-600:      #666666;\n  --color-gray-700:      #5C5C5C;  /* logo tagline gray */\n  --color-gray-900:      #222222;\n\n  /* ── Legacy aliases (do not remove — referenced across components) ── */\n  --color-orange:        var(--color-purple);        /* legacy → primary (purple) */\n  --color-orange-hover:  var(--color-purple-hover);\n  --color-orange-tint:   var(--color-purple-tint);\n  --color-navy:          var(--color-plum);          /* legacy → dark (plum) */\n  --color-navy-soft:     var(--color-plum-soft);\n\n  /* ── Semantic: brand ── */\n  --color-primary:       var(--color-purple);\n  --color-primary-hover: var(--color-purple-hover);\n  --color-accent:        var(--color-coral);\n  --color-accent-hover:  var(--color-coral-hover);\n  --color-accent-tint:   var(--color-coral-tint);\n  --color-dark:          var(--color-plum);\n\n  /* ── Semantic: surfaces ── */\n  --surface-page:        #F7F4F8;   /* Soft Lavender White */\n  --surface-section:     #EFE8F2;   /* Light Lavender Gray */\n  --surface-card:        var(--color-white);\n  --surface-mid:         var(--color-gray-100);\n  --surface-dark:        var(--color-plum);\n  --surface-dark-soft:   var(--color-plum-soft);\n  --overlay-scrim:       rgba(0, 0, 0, 0.55);\n  --overlay-orange:      rgba(182, 90, 75, 0.62);    /* legacy name; terracotta hover overlay */\n  --overlay-accent:      rgba(182, 90, 75, 0.62);\n\n  /* ── Semantic: text ── */\n  --text-heading:        var(--color-plum);\n  --text-body:           #444444;\n  --text-muted:          var(--color-gray-500);\n  --text-muted-aa:       var(--color-gray-600);  /* AA-safe muted for <18px */\n  --text-on-dark:        var(--color-white);\n  --text-on-dark-soft:   rgba(255, 255, 255, 0.75);\n  --text-link:           var(--color-purple);\n  --text-link-hover:     var(--color-purple-hover);\n\n  /* ── Semantic: borders ── */\n  --border-default:      var(--color-gray-200);\n  --border-divider:      var(--color-gray-300);\n  --border-focus:        var(--color-purple);\n  --border-on-dark:      rgba(255, 255, 255, 0.16);\n\n  /* ── Status ── */\n  --color-success:       #28A745;\n  --color-warning:       #FFC107;\n  --color-error:         #DC3545;\n  --focus-ring:          0 0 0 3px rgba(74, 58, 106, 0.20);\n}\n\n/* ════════════════════════════════════════════════════════════════\n   Expandus — Typography tokens\n   Headings: Montserrat · Body: Gordita (Mulish substitute)\n   Role-based, responsive scale aligned to an 8px grid.\n   Sizes + line-heights are exposed as CSS variables and re-declared\n   at tablet/mobile breakpoints so type reflows automatically.\n   Breakpoints:  tablet ≤ 1024px · mobile ≤ 640px\n   ════════════════════════════════════════════════════════════════ */\n:root {\n  /* ── Families ── */\n  --font-display: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-body:    'Gordita', 'Mulish', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-mono:    'Courier New', Courier, monospace;\n\n  /* ════ ROLE SCALE — Desktop (default) ════ */\n  /* Headings (Montserrat) */\n  --text-h1: 56px;  --lh-h1: 64px;\n  --text-h2: 48px;  --lh-h2: 56px;\n  --text-h3: 40px;  --lh-h3: 48px;\n  --text-h4: 32px;  --lh-h4: 40px;\n  --text-h5: 24px;  --lh-h5: 32px;\n  --text-h6: 16px;  --lh-h6: 24px;\n\n  /* Body & UI (Gordita) */\n  --text-body-lg: 16px;  --lh-body-lg: 24px;   /* Body large */\n  --text-body:    14px;  --lh-body:    22px;   /* Body regular */\n  --text-body-sm: 13px;  --lh-body-sm: 20px;   /* Body small */\n  --text-button:  14px;  --lh-button:  20px;   /* CTA / Button — same size as Body Regular, weight 700 */\n  --text-caption: 13px;  --lh-caption: 20px;   /* Caption / eyebrow */\n\n  /* ── Pill tokens — unified pill/badge component ── */\n  --text-pill:   13px;   /* desktop + tablet */\n  --lh-pill:     18px;\n  --pad-pill:    6px 12px;\n  --radius-pill: 999px;\n  --weight-pill: 600;\n  --gap-pill:    6px;\n\n  /* ── CTA rule (alias tokens for explicit brand docs) ── */\n  --weight-cta: 700;   /* all CTAs: bold — no semibold, no uppercase */\n\n  /* ── Weights ── */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* ── Line heights (unitless, legacy/utility) ── */\n  --leading-tight:   1.2;\n  --leading-snug:    1.4;\n  --leading-normal:  1.6;\n  --leading-relaxed: 1.7;\n\n  /* ── Letter spacing ── */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.05em;   /* eyebrows / overlines (not buttons) */\n  --tracking-wider:  0.1em;    /* all-caps labels */\n\n  /* ── Legacy step scale (kept for dense UI / back-compat) ──\n     Micro UI (badges, tiny labels) intentionally stays below the\n     16px role floor for density. */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-lg:   18px;\n  --text-xl:   20px;\n  --text-2xl:  24px;\n  --text-3xl:  32px;\n  --text-4xl:  42px;\n  --text-5xl:  56px;\n}\n\n/* ════ Tablet ≤ 1024px ════ */\n@media (max-width: 1024px) {\n  :root {\n    --text-h1: 48px;  --lh-h1: 56px;\n    --text-h2: 40px;  --lh-h2: 48px;\n    --text-h3: 32px;  --lh-h3: 40px;\n    --text-h4: 24px;  --lh-h4: 32px;\n    --text-h5: 20px;  --lh-h5: 28px;\n    --text-h6: 16px;  --lh-h6: 24px;\n    --text-body-lg: 16px;  --lh-body-lg: 24px;\n  }\n}\n\n/* ════ Tablet ≤ 1024px — pill stays 13px/18px, padding slightly tighter ════ */\n@media (max-width: 1024px) {\n  :root {\n    --pad-pill: 5px 10px;\n  }\n}\n\n/* ════ Mobile ≤ 640px ════ */\n@media (max-width: 640px) {\n  :root {\n    --text-pill: 12px;\n    --lh-pill:   16px;\n    --pad-pill:  5px 10px;\n    --text-h1: 40px;  --lh-h1: 48px;\n    --text-h2: 32px;  --lh-h2: 40px;\n    --text-h3: 24px;  --lh-h3: 32px;\n    --text-h4: 20px;  --lh-h4: 28px;\n    --text-h5: 18px;  --lh-h5: 26px;\n    --text-h6: 16px;  --lh-h6: 24px;\n    --text-body-lg: 15px;  --lh-body-lg: 24px;\n  }\n}\n\n/* ─────────────────────────────────────────────\n   Expandus — Spacing, radius, layout tokens\n   8px base grid.\n   ───────────────────────────────────────────── */\n:root {\n  /* Spacing (8px base) */\n  --space-xs:  4px;\n  --space-sm:  8px;\n  --space-md:  16px;\n  --space-lg:  24px;\n  --space-xl:  32px;\n  --space-2xl: 48px;\n  --space-3xl: 64px;\n  --space-4xl: 80px;\n  --space-5xl: 100px;\n\n  /* ── Radius scale ── */\n  --radius-sm:   8px;    /* small tags, icon buttons, compact UI */\n  --radius-md:   12px;   /* buttons, CTAs, form fields, small cards */\n  --radius-lg:   16px;   /* main cards, feature cards, section cards */\n  --radius-xl:   24px;   /* hero visuals, large panels, premium sections */\n  --radius-pill: 999px;  /* pills, badges, tags — never use on cards/buttons */\n\n  /* ── Semantic radius aliases ── */\n  --radius-card: var(--radius-lg);   /* all content cards */\n  --radius-cta:  var(--radius-md);   /* all CTA / button elements */\n  --radius-form: var(--radius-md);   /* inputs, selects, textareas */\n  --radius-icon: var(--radius-sm);   /* icon buttons, compact controls */\n\n  /* Layout */\n  --container-narrow: 860px;\n  --container-max:    1200px;\n  --container-wide:   1400px;\n  --header-height:    72px;\n\n  /* Z-index */\n  --z-base:     0;   /* @kind other */\n  --z-raised:   10;  /* @kind other */\n  --z-dropdown: 100; /* @kind other */\n  --z-sticky:   200; /* @kind other */\n  --z-overlay:  300; /* @kind other */\n  --z-modal:    400; /* @kind other */\n  --z-toast:    500; /* @kind other */\n}\n\n/* ─────────────────────────────────────────────\n   Expandus — Shadows & transitions\n   Brand-tinted soft shadows (plum undertone). No heavy glows.\n   All shadows use rgba(16,10,35,…) — the plum colour dark anchor.\n   ───────────────────────────────────────────── */\n:root {\n  /* ── Primitive shadow scale ── */\n  --shadow-sm: 0 2px 8px  rgba(16, 10, 35, 0.06);\n  --shadow-md: 0 4px 16px rgba(16, 10, 35, 0.08);\n  --shadow-lg: 0 8px 24px rgba(16, 10, 35, 0.10);\n  --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.18);\n\n  /* ── Semantic shadow aliases (use these in components) ── */\n  --shadow-soft:         0 8px 24px  rgba(16, 10, 35, 0.08);  /* card default */\n  --shadow-hover:        0 12px 32px rgba(16, 10, 35, 0.12);  /* card hover lift */\n  --shadow-dark-section: 0 12px 32px rgba(0, 0, 0, 0.18);     /* on dark bg */\n\n  /* Dropdown / popover */\n  --shadow-pop: 0 8px 24px rgba(16, 10, 35, 0.12);\n\n  --transition-fast:   all 0.15s ease; /* @kind other */\n  --transition-normal: all 0.2s ease;  /* @kind other */\n  --transition-slow:   all 0.3s ease;  /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n}\n\n/* ════════════════════════════════════════════════════════════════\n   Expandus — Global base typography\n   Applies the role-based, responsive type scale to real elements so\n   any page linking styles.css gets correct heading/body sizing for\n   free. All sizes/line-heights come from the responsive tokens in\n   typography.css, so these reflow at tablet/mobile automatically.\n   ════════════════════════════════════════════════════════════════ */\n\n/* Box sizing + no horizontal overflow on any screen */\n*, *::before, *::after { box-sizing: border-box; }\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  font-weight: var(--weight-regular);\n  color: #444444;                /* body text color (avoids --text-body size-token collision) */\n  overflow-x: hidden;            /* prevent horizontal scroll */\n}\n\n/* Headings — Montserrat */\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  color: var(--text-heading);\n  margin: 0 0 0.5em;\n  font-weight: var(--weight-bold);\n  text-wrap: balance;            /* avoid awkward heading wraps */\n  overflow-wrap: break-word;     /* prevent long-word overflow */\n}\nh1 { font-size: var(--text-h1); line-height: var(--lh-h1); letter-spacing: var(--tracking-tight); }\nh2 { font-size: var(--text-h2); line-height: var(--lh-h2); letter-spacing: var(--tracking-snug); font-weight: var(--weight-semibold); }\nh3 { font-size: var(--text-h3); line-height: var(--lh-h3); letter-spacing: var(--tracking-snug); font-weight: var(--weight-semibold); }\nh4 { font-size: var(--text-h4); line-height: var(--lh-h4); font-weight: var(--weight-semibold); }\nh5 { font-size: var(--text-h5); line-height: var(--lh-h5); font-weight: var(--weight-semibold); }\nh6 { font-size: var(--text-h6); line-height: var(--lh-h6); font-weight: var(--weight-semibold); }\n\n/* Body copy — Gordita */\np { margin: 0 0 1em; font-size: var(--text-body); line-height: var(--lh-body); text-wrap: pretty; overflow-wrap: break-word; }\n.text-body-lg, .lead { font-size: var(--text-body-lg); line-height: var(--lh-body-lg); }\n.text-body-sm, small { font-size: var(--text-body-sm); line-height: var(--lh-body-sm); }\n\n/* UI roles */\nbutton, input, select, textarea, label { font-family: var(--font-body); }\nbutton, .button-text { font-size: var(--text-button); line-height: var(--lh-button); font-weight: var(--weight-cta); text-transform: none; letter-spacing: normal; }\n.caption, .eyebrow { font-size: var(--text-caption); line-height: var(--lh-caption); }\n\nimg, svg, video { max-width: 100%; height: auto; }\n\n<\u002Fstyle>\n  <script>\n  (function(){\n    var SRC=(window.__resources&&window.__resources.dsBundle)||'_ds/expandus-design-system-v2-a2219534-9b01-459d-b427-3767b07ca363/_ds_bundle.js';\n    var loaded=false;\n    function load(){ if(loaded) return; loaded=true; var s=document.createElement('script'); s.src=SRC; document.head.appendChild(s); }\n    if(window.React){ load(); }\n    else { var n=0, t=setInterval(function(){ n++; if(window.React||n>400){ clearInterval(t); load(); } }, 8); }\n  })();\n  <\u002Fscrip u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ============ SECTION 1 — HERO ============ -->\n  <section style=\"position:relative;background:radial-gradient(1200px 600px at 78% 8%,rgba(74,58,106,0.55),transparent 60%),linear-gradient(160deg,#2F2A3A 0%,#342B4A 55%,#272033 100%);overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.028) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(ellipse 55% 90% at 15% 40%,#000 35%,transparent 80%);mask-image:radial-gradient(ellipse 55% 90% at 15% 40%,#000 35%,transparent 80%);pointer-events:none\"><\u002Fdiv>\n    <div class=\"exp-hero-grid\" style=\"position:relative;max-width:1400px;margin:0 auto;padding:100px 24px;display:grid;grid-template-columns:1.05fr 0.95fr;gap:56px;align-items:center\">\n      <!-- left -->\n      <div>\n        <div style=\"display:inline-flex;align-items:center;gap:10px;padding:8px 16px;border:1px solid rgba(182,90,75,0.35);border-radius:999px;background:rgba(182,90,75,0.1);margin-bottom:28px\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:var(--color-coral);box-shadow:0 0 0 4px rgba(182,90,75,0.25);display:inline-block;animation:expPulse 2.4s ease-in-out infinite\"><\u002Fspan>\n          <span style=\"font-family:var(--font-display);font-size:var(--text-xs);font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#fff\">Move The Red Dot™<\u002Fspan>\n        <\u002Fdiv>\n        <h1 class=\"exp-h1\" style=\"font-family:var(--font-display);font-size:var(--text-h1);line-height:var(--lh-h1);letter-spacing:var(--tracking-tight);font-weight:var(--weight-bold);color:#fff;margin:0;max-width:600px\">Build a business that <span style=\"color:var(--color-coral)\">scales beyond you.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:var(--text-lg);line-height:var(--leading-relaxed);color:rgba(255,255,255,0.78);margin:26px 0 0;max-width:560px\">Expandus helps founders cross the Founder Dependency Chasm™ and transform founder-led businesses into scalable, system-driven, self-sustaining organisations — moving you from operational dependence to scalable leadership.<\u002Fp>\n        \n        \n        <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:30px\">\n          <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" size=\"lg\" on-click=\"{{ goJourney }}\" hint-size=\"auto,52px\" style=\"background:#B65A4B;border-color:#B65A4B\">Identify Your Red Dot Stage™<\u002Fx-import>\n          <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" variant=\"outline-white\" size=\"lg\" on-click=\"{{ goFinal }}\" hint-size=\"auto,52px\" style=\"text-transform: capitalize\">Book A Scale Session<\u002Fx-import>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:18px\">\n          \n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- right: Variation B — Centre to Edge diagram -->\n      <div style=\"position:relative;align-self:stretch;display:flex;align-items:center;justify-content:center\">\n        <div style=\"position:relative;width:100%;max-width:460px;background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.13);border-radius:6px;padding:32px 28px 24px;box-shadow:var(--shadow-md);animation:expFloat 7s ease-in-out infinite\">\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:22px\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:#B65A4B;box-shadow:0 0 0 4px rgba(182,90,75,0.22);animation:expPulse 2.4s ease-in-out infinite;flex-shrink:0\"><\u002Fspan>\n            <span style=\"font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#fff\">The Red Dot Journey™<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:center\">\n            <svg viewBox=\"0 0 320 280\" style=\"width:100%;max-width:320px;height:auto;display:block;overflow:visible\">\n              <!-- orbit rings — subtle stroke so square-grid hero bg remains visible -->\n              <circle cx=\"160\" cy=\"148\" r=\"44\" fill=\"none\" stroke=\"rgba(255,255,255,0.13)\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"160\" cy=\"148\" r=\"88\" fill=\"none\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"160\" cy=\"148\" r=\"126\" fill=\"none\" stroke=\"rgba(255,255,255,0.07)\" stroke-width=\"1.5\"><\u002Fcircle>\n              <!-- ring labels -->\n              <text x=\"206\" y=\"108\" fill=\"rgba(255,255,255,0.42)\" font-family=\"var(--font-display)\" font-size=\"9.5\" font-weight=\"600\">Team<\u002Ftext>\n              <text x=\"250\" y=\"68\" fill=\"rgba(255,255,255,0.42)\" font-family=\"var(--font-display)\" font-size=\"9.5\" font-weight=\"600\">Leaders<\u002Ftext>\n              <text x=\"284\" y=\"30\" fill=\"rgba(255,255,255,0.42)\" font-family=\"var(--font-display)\" font-size=\"9.5\" font-weight=\"600\">Systems<\u002Ftext>\n              <!-- team dots on ring 1 -->\n              <circle cx=\"204\" cy=\"148\" r=\"5.5\" fill=\"rgba(185,169,214,0.8)\"><\u002Fcircle>\n              <circle cx=\"138\" cy=\"110\" r=\"5.5\" fill=\"rgba(185,169,214,0.8)\"><\u002Fcircle>\n              <circle cx=\"138\" cy=\"186\" r=\"5.5\" fill=\"rgba(185,169,214,0.8)\"><\u002Fcircle>\n              <!-- leader dots on ring 2 -->\n              <circle cx=\"248\" cy=\"148\" r=\"5\" fill=\"rgba(185,169,214,0.55)\"><\u002Fcircle>\n              <circle cx=\"113\" cy=\"75\" r=\"5\" fill=\"rgba(185,169,214,0.55)\"><\u002Fcircle>\n              <circle cx=\"207\" cy=\"75\" r=\"5\" fill=\"rgba(185,169,214,0.55)\"><\u002Fcircle>\n              <circle cx=\"113\" cy=\"221\" r=\"5\" fill=\"rgba(185,169,214,0.55)\"><\u002Fcircle>\n              <circle cx=\"207\" cy=\"221\" r=\"5\" fill=\"rgba(185,169,214,0.55)\"><\u002Fcircle>\n              <!-- system dots on ring 3 -->\n              <circle cx=\"286\" cy=\"148\" r=\"4\" fill=\"rgba(185,169,214,0.35)\"><\u002Fcircle>\n              <circle cx=\"88\" cy=\"55\" r=\"4\" fill=\"rgba(185,169,214,0.35)\"><\u002Fcircle>\n              <circle cx=\"232\" cy=\"55\" r=\"4\" fill=\"rgba(185,169,214,0.35)\"><\u002Fcircle>\n              <!-- dashed path centre → edge (top-right corner) -->\n              <line x1=\"160\" y1=\"148\" x2=\"295\" y2=\"14\" stroke=\"rgba(182,90,75,0.5)\" stroke-width=\"1.5\" stroke-dasharray=\"5 4\"><\u002Fline>\n              <!-- destination marker -->\n              <circle cx=\"295\" cy=\"14\" r=\"7.5\" fill=\"none\" stroke=\"#B65A4B\" stroke-width=\"1.5\" opacity=\"0.85\"><\u002Fcircle>\n              <circle cx=\"295\" cy=\"14\" r=\"3.5\" fill=\"#B65A4B\"><\u002Fcircle>\n              <text x=\"285\" y=\"9\" fill=\"rgba(255,255,255,0.65)\" font-family=\"var(--font-display)\" font-size=\"8.5\" font-weight=\"700\" text-anchor=\"end\">Free to lead<\u002Ftext>\n              <!-- centre origin marker -->\n              <circle cx=\"160\" cy=\"148\" r=\"9\" fill=\"rgba(182,90,75,0.18)\" stroke=\"rgba(182,90,75,0.45)\" stroke-width=\"1.5\"><\u002Fcircle>\n              <text x=\"160\" y=\"170\" fill=\"rgba(255,255,255,0.48)\" font-family=\"var(--font-display)\" font-size=\"9\" text-anchor=\"middle\">Founder<\u002Ftext>\n              <!-- animated red dot travelling centre → edge -->\n              <g filter=\"url(#hGlow)\">\n                <circle r=\"11\" fill=\"#B65A4B\">\n                  <animateMotion dur=\"5s\" repeatCount=\"indefinite\" calcMode=\"spline\" keySplines=\"0.4 0 0.6 1;0.4 0 0.6 1\" keyTimes=\"0;0.85;1\" path=\"M160,148 L295,14 L295,14\"><\u002FanimateMotion>\n                <\u002Fcircle>\n                <circle r=\"4.5\" fill=\"#fff\" opacity=\"0.9\">\n                  <animateMotion dur=\"5s\" repeatCount=\"indefinite\" calcMode=\"spline\" keySplines=\"0.4 0 0.6 1;0.4 0 0.6 1\" keyTimes=\"0;0.85;1\" path=\"M160,148 L295,14 L295,14\"><\u002FanimateMotion>\n                <\u002Fcircle>\n              <\u002Fg>\n              <defs>\n                <filter id=\"hGlow\" x=\"-80%\" y=\"-80%\" width=\"260%\" height=\"260%\">\n                  <feGaussianBlur stdDeviation=\"5\" result=\"b\"><\u002FfeGaussianBlur>\n                  <feMerge><feMergeNode in=\"b\"><\u002FfeMergeNode><feMergeNode in=\"SourceGraphic\"><\u002FfeMergeNode><\u002FfeMerge>\n                <\u002Ffilter>\n              <\u002Fdefs>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <p style=\"font-size:11.5px;line-height:1.55;color:rgba(255,255,255,0.46);margin:16px 2px 0;text-align:center\">The founder moves from the centre of everything to the edge — free to lead, free to grow.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TRANSFORMATIONS STRIP ============ -->\n  <section style=\"background:var(--color-plum-soft);border-top:1px solid rgba(255,255,255,0.08)\">\n    <div class=\"exp-transforms\" style=\"max-width:1400px;margin:0 auto;padding:36px 24px;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:0 0\">\n      <sc-for list=\"{{ transforms }}\" as=\"t\" hint-placeholder-count=\"5\">\n        <div style=\"padding:8px 24px;border-right:{{ t.divider }}\" class=\"exp-transforms-item\">\n          <div style=\"display:flex;align-items:center;gap:7px;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:-0.01em;margin-bottom:6px\">\n            <span style=\"color:#fff\">{{ t.from }}<\u002Fspan>\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg>\n            <span style=\"color:#B65A4B\">{{ t.to }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.55)\">{{ t.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SIX STAGES ACCORDION ============ -->\n  <section style=\"display:none;background:var(--surface-section);padding:var(--space-4xl) 0\">\n    <div style=\"max-width:1400px;margin:0 auto;padding:0 24px\">\n      <div data-reveal=\"\" style=\"text-align:center;max-width:720px;margin:0 auto 44px\">\n        <div style=\"font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--color-coral);margin-bottom:12px\">The Six Stages of Founder Evolution<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-size:var(--text-h3);line-height:var(--lh-h3);letter-spacing:var(--tracking-tight);font-weight:var(--weight-bold);color:var(--text-heading);margin:0\">Find the stage that sounds like your business today.<\u002Fh2>\n      <\u002Fdiv>\n\n      <!-- Stages 1-4 -->\n      <div class=\"exp-stage-grid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n        <sc-for list=\"{{ stagesPre }}\" as=\"stage\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid var(--color-gray-200);border-radius:6px;padding:24px 26px;box-shadow:var(--shadow-sm)\">\n            <button onclick=\"{{ stage.onToggle }}\" style=\"{{ stage.headStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:16px\">\n                <span style=\"font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--color-gray-200);line-height:1;min-width:42px\">{{ stage.n2 }}<\u002Fspan>\n                <div>\n                  <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n                    <h3 style=\"font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-bold);color:var(--text-heading);margin:0;letter-spacing:var(--tracking-snug)\">{{ stage.role }}<\u002Fh3>\n                    <span style=\"font-family:var(--font-display);font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-coral);background:var(--color-coral-tint);padding:4px 9px;border-radius:999px\">{{ stage.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"font-size:14px;color:var(--text-muted-aa);margin:5px 0 0\">{{ stage.descriptor }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ stage.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4A3A6A\" stroke-width=\"2.2\" stroke-linecap=\"round\" style=\"flex-shrink:0\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ stage.isClosed }}\" hint-placeholder-val=\"{{ true }}\">\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4A3A6A\" stroke-width=\"2.2\" stroke-linecap=\"round\" style=\"flex-shrink:0\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              <\u002Fsc-if>\n            <\u002Fbutton>\n            <sc-if value=\"{{ stage.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"margin-top:20px;padding-top:20px;border-top:1px solid var(--color-gray-100)\">\n                <p style=\"font-size:var(--text-base);line-height:var(--leading-relaxed);color:var(--text-body);margin:0 0 18px\">{{ stage.desc }}<\u002Fp>\n                <div style=\"font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-heading);margin-bottom:10px\">Key signals you are here<\u002Fdiv>\n                <ul style=\"list-style:none;padding:0;margin:0 0 18px;display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ stage.signals }}\" as=\"sig\" hint-placeholder-count=\"4\">\n                    <li style=\"display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.5;color:var(--text-body)\">\n                      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4A3A6A\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n                      <span>{{ sig }}<\u002Fspan>\n                    <\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n                <div style=\"background:var(--color-purple-tint);border-radius:6px;padding:13px 15px;font-size:var(--text-sm);line-height:1.6;color:var(--text-heading);font-style:italic\">{{ stage.note }}<\u002Fdiv>\n                <a href=\"#journey\" style=\"display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--color-primary);text-decoration:none;letter-spacing:0.02em\">Read more about Stage {{ stage.num }}\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fa>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Founder Dependency Chasm band -->\n      <div data-reveal=\"\" style=\"position:relative;margin:26px 0;border-radius:var(--radius-lg);overflow:hidden;background:linear-gradient(135deg,#2F2A3A,#423862);border:1px solid rgba(255,255,255,0.08)\">\n        <div class=\"exp-chasm-line\" style=\"position:absolute;top:0;bottom:0;left:50%;width:2px;background:repeating-linear-gradient(to bottom,rgba(182,90,75,0.7) 0 8px,transparent 8px 16px);transform:translateX(-50%)\"><\u002Fdiv>\n        <div class=\"exp-chasm-grid\" style=\"position:relative;padding:48px 48px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start\">\n          <!-- left: narrative -->\n          <div>\n            <div style=\"font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--color-coral);margin-bottom:14px\">The critical crossing point<\u002Fdiv>\n            <h3 style=\"font-family:var(--font-display);font-size:var(--text-h3);line-height:var(--lh-h3);font-weight:var(--weight-bold);color:#fff;margin:0 0 20px;letter-spacing:var(--tracking-tight)\">The Founder Dependency Chasm™<\u002Fh3>\n            <div style=\"display:inline-block;background:rgba(182,90,75,0.12);border-left:4px solid var(--color-coral);border-radius:0 8px 8px 0;padding:14px 20px;margin-bottom:24px\">\n              <p style=\"font-family:var(--font-display);font-size:18px;font-weight:700;color:#fff;margin:0;letter-spacing:-0.01em;font-style:italic\">“What got you here will not get you there.”<\u002Fp>\n            <\u002Fdiv>\n            <p style=\"font-size:15.5px;line-height:1.75;color:rgba(255,255,255,0.78);margin:0 0 16px\">This is the point where founders must stop being the centre of the business and start building leadership, systems, and accountability around them.<\u002Fp>\n            <p style=\"font-size:15.5px;line-height:1.75;color:rgba(255,255,255,0.78);margin:0 0 16px\">Many businesses reach this point. <strong style=\"color:#fff\">Few successfully cross it.<\u002Fstrong><\u002Fp>\n            <p style=\"font-size:15.5px;line-height:1.75;color:rgba(255,255,255,0.78);margin:0\">The challenge is no longer growth. <strong style=\"color:var(--color-coral)\">The challenge is letting go.<\u002Fstrong><\u002Fp>\n          <\u002Fdiv>\n          <!-- right: requirements + shift -->\n          <div style=\"display:flex;flex-direction:column;gap:24px\">\n            <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:26px 28px\">\n              <div style=\"font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:16px\">Crossing the chasm requires<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 20px\">\n                <sc-for list=\"{{ chasmNeeds }}\" as=\"need\" hint-placeholder-count=\"5\">\n                  <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:14.5px;font-weight:600;color:#fff\">\n                    <span style=\"width:8px;height:8px;border-radius:50%;background:var(--color-coral);flex-shrink:0\"><\u002Fspan>{{ need }}\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(182,90,75,0.08);border:1px solid rgba(182,90,75,0.22);border-radius:6px;padding:22px 26px\">\n              <div style=\"font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--color-coral);margin-bottom:12px\">The founder identity shift<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap\">\n                <div style=\"background:rgba(255,255,255,0.08);border-radius:6px;padding:10px 16px;font-family:var(--font-display);font-size:14px;font-weight:700;color:rgba(255,255,255,0.6);text-decoration:line-through\">Hero of the business<\u002Fdiv>\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B65A4B\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg>\n                <div style=\"background:rgba(182,90,75,0.18);border:1px solid rgba(182,90,75,0.4);border-radius:6px;padding:10px 16px;font-family:var(--font-display);font-size:14px;font-weight:700;color:#fff\">Architect of the business<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-size:13px;color:rgba(255,255,255,0.5);margin:14px 0 0;font-style:italic\">This is the most difficult transition in the entire Red Dot Journey™.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Stages 5-6 -->\n      <div style=\"display:flex;align-items:center;gap:12px;margin:0 0 16px\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#1F8A5B\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1F8A5B\"><\u002Fspan>Investible Business<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:var(--color-gray-200)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"exp-stage-grid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n        <sc-for list=\"{{ stagesPost }}\" as=\"stage\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fff;border:1px solid var(--color-gray-200);border-radius:6px;padding:24px 26px;box-shadow:var(--shadow-sm)\">\n            <button onclick=\"{{ stage.onToggle }}\" style=\"{{ stage.headStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:16px\">\n                <span style=\"font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--color-gray-200);line-height:1;min-width:42px\">{{ stage.n2 }}<\u002Fspan>\n                <div>\n                  <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n                    <h3 style=\"font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-bold);color:var(--text-heading);margin:0;letter-spacing:var(--tracking-snug)\">{{ stage.role }}<\u002Fh3>\n                    <span style=\"font-family:var(--font-display);font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#1F8A5B;background:rgba(31,138,91,0.1);padding:4px 9px;border-radius:999px\">{{ stage.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"font-size:14px;color:var(--text-muted-aa);margin:5px 0 0\">{{ stage.descriptor }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ stage.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4A3A6A\" stroke-width=\"2.2\" stroke-linecap=\"round\" style=\"flex-shrink:0\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ stage.isClosed }}\" hint-placeholder-val=\"{{ true }}\">\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4A3A6A\" stroke-width=\"2.2\" stroke-linecap=\"round\" style=\"flex-shrink:0\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              <\u002Fsc-if>\n            <\u002Fbutton>\n            <sc-if value=\"{{ stage.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"margin-top:20px;padding-top:20px;border-top:1px solid var(--color-gray-100)\">\n                <p style=\"font-size:var(--text-base);line-height:var(--leading-relaxed);color:var(--text-body);margin:0 0 18px\">{{ stage.desc }}<\u002Fp>\n                <div style=\"font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-heading);margin-bottom:10px\">Key signals you are here<\u002Fdiv>\n                <ul style=\"list-style:none;padding:0;margin:0 0 18px;display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ stage.signals }}\" as=\"sig\" hint-placeholder-count=\"4\">\n                    <li style=\"display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.5;color:var(--text-body)\">\n                      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F8A5B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n                      <span>{{ sig }}<\u002Fspan>\n                    <\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n                <div style=\"background:rgba(31,138,91,0.08);border-radius:6px;padding:13px 15px;font-size:var(--text-sm);line-height:1.6;color:var(--text-heading);font-style:italic\">{{ stage.note }}<\u002Fdiv>\n                <a href=\"#journey\" style=\"display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--color-primary);text-decoration:none;letter-spacing:0.02em\">Read more about Stage {{ stage.num }}\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fa>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 2 — WHAT IS THE RED DOT THEORY ============ -->\n  <section id=\"theory\" style=\"background:#fff;padding:92px 0\">\n    <div style=\"max-width:1400px;margin:0 auto;padding:0 24px\">\n      <div data-reveal=\"\" style=\"text-align:center;max-width:780px;margin:0 auto 14px\">\n        <div style=\"font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--color-coral);margin-bottom:14px\">What is the Red Dot Theory™<\u002Fdiv>\n        <h2 class=\"exp-h2-40\" style=\"font-family:var(--font-display);font-size:var(--text-h2);line-height:var(--lh-h2);letter-spacing:var(--tracking-tight);font-weight:var(--weight-bold);color:var(--text-heading);margin:0\">From Founder to Architect.<br>The journey every business owner must make.<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.7;color:var(--text-body);margin:18px auto 0;max-width:660px\">A framework for understanding how your role must evolve as your business grows.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" class=\"exp-theory-grid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;margin-top:48px\">\n        <div>\n          <p style=\"font-size:16px;line-height:1.8;color:var(--text-body);margin:0 0 18px\">In the beginning, you <strong style=\"color: var(--text-heading); font-weight: 400\">are<\u002Fstrong> the business. Every decision, every client relationship, every delivery, every crisis — it all flows through you. The Red Dot Theory™ maps the journey from that moment of complete founder-dependency, to building an organisation that runs, grows, and scales without you at the centre of everything.<\u002Fp>\n          <p style=\"font-size:16px;line-height:1.8;color:var(--text-body);margin:0 0 18px\">The <span style=\"color:var(--color-coral);font-weight:700\">red dot<\u002Fspan> is you — the founder. The <span style=\"color:#7E5BC0;font-weight:700\">blue dots<\u002Fspan> are your team, your systems, your leaders. As your business matures, the position of the red dot tells you everything about the health, scalability, and investibility of your business.<\u002Fp>\n          <p style=\"font-size:16px;line-height:1.8;color:var(--text-body);margin:0 0 26px\">The goal is not simply to grow revenue. The goal is to grow revenue, grow profits <strong style=\"color:var(--text-heading)\">AND move the red dot<\u002Fstrong> — from being the engine of everything, to becoming the architect of a self-sustaining business.<\u002Fp>\n          <x-import component-from-global-scope=\"ExpandusDesignSystem_1b82a0.Button\" on-click=\"{{ goJourney }}\" hint-size=\"auto,44px\">Discover Where You Are<\u002Fx-import>\n        <\u002Fdiv>\n        <!-- cluster diagram -->\n        <div style=\"background:linear-gradient(165deg,#F7F5FB,#FCEFEF);border:1px solid var(--color-gray-200);border-radius:var(--radius-lg);padding:30px 26px\">\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n            <sc-for list=\"{{ clusters }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"background:#fff;border:1px solid var(--color-gray-200);border-radius:6px;padding:12px 10px 10px;text-align:center\">\n                <svg viewBox=\"0 0 120 120\" style=\"width:100%;height:auto;display:block\">\n                  <sc-for list=\"{{ c.blue }}\" as=\"b\" hint-placeholder-count=\"4\">\n                    <circle cx=\"{{ b.x }}\" cy=\"{{ b.y }}\" r=\"6\" fill=\"#B9A9D6\"><\u002Fcircle>\n                  <\u002Fsc-for>\n                  <circle cx=\"{{ c.rx }}\" cy=\"{{ c.ry }}\" r=\"9\" fill=\"#B65A4B\"><\u002Fcircle>\n                  <circle cx=\"{{ c.rx }}\" cy=\"{{ c.ry }}\" r=\"9\" fill=\"none\" stroke=\"#B65A4B\" stroke-width=\"2\" opacity=\"0.35\"><animate attributeName=\"r\" values=\"9;15;9\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0.35;0;0.35\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n                <\u002Fsvg>\n                <div style=\"font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text-heading); margin-top: 6px\">Stage {{ c.num }}<\u002Fdiv>\n                <div style=\"font-size: 13px; color: var(--text-muted-aa); letter-spacing: 0.02em\">{{ c.role }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"font-size: 16px; line-height: 1.55; color: var(--text-muted-aa); margin: 16px 4px 0; text-align: center\">Each cluster shows the red dot (founder) in relation to the blue dots (team). Notice how the red dot moves from centre to edge as the business matures.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 3 — WHERE ARE YOU ON THE JOURNEY (interactive track) ============ -->\n  <section id=\"journey\" style=\"position:relative;background:#F7F4F8;padding:var(--space-4xl) 0;overflow:hidden\">\n    <div style=\"max-width:1400px;margin:0 auto;padding:0 24px\">\n      <div data-reveal=\"\" style=\"text-align:center;max-width:760px;margin:0 auto 8px\">\n        <div style=\"font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--color-coral);margin-bottom:14px\">Where are you on the Red Dot Journey?<\u002Fdiv>\n        <h2 class=\"exp-h2-38\" style=\"font-family:var(--font-display);font-size:var(--text-h2);line-height:var(--lh-h2);letter-spacing:var(--tracking-tight);font-weight:var(--weight-bold);color:var(--text-heading);margin:0\">That's exactly where I am.<\u002Fh2>\n        <p style=\"font-size: 18px; line-height: 1.7; color: var(--text-body); margin: 16px auto 0; max-width: 680px\">Wherever you are on your growth journey, the challenges are different — but the pattern is the same. What helped you reach your current stage will rarely be enough to reach the next. The key is knowing where you are today — and what it will take to move the Red Dot forward.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"exp-journey-scroll\"><div class=\"exp-journey-inner\">\n      <!-- zone labels -->\n      <div data-reveal=\"\" style=\"display:flex;align-items:flex-end;margin-top:48px\">\n        <div style=\"flex:4;text-align:center\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#B65A4B;padding:6px 14px;border:1px solid rgba(182,90,75,0.35);border-radius:999px;background:rgba(182,90,75,0.08)\"><span style=\"width:8px;height:8px;border-radius:50%;background:#B65A4B\"><\u002Fspan>Not Investible Business · Stages 1–4<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:0 0 104px\"><\u002Fdiv>\n        <div style=\"flex:2;text-align:center\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#3FD18B;padding:6px 14px;border:1px solid rgba(63,209,139,0.35);border-radius:999px;background:rgba(63,209,139,0.08)\"><span style=\"width:8px;height:8px;border-radius:50%;background:#3FD18B\"><\u002Fspan>Investible · 5–6<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- the track -->\n      <div style=\"display:flex;align-items:flex-start;margin-top:18px\">\n        <div style=\"flex:4;position:relative;display:flex;justify-content:space-around;padding:0 4px\">\n          <div style=\"position:absolute;top:44px;left:11%;right:0;height:3px;background:linear-gradient(90deg,#B65A4B,#B4527A);z-index:0\"><\u002Fdiv>\n          <sc-for list=\"{{ journeyLeft }}\" as=\"stage\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ stage.onSelect }}\" style=\"{{ stage.colStyle }}\">\n              <div style=\"height:88px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1\">\n                <div style=\"{{ stage.circleStyle }}\">{{ stage.num }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"{{ stage.nameStyle }}\">{{ stage.role }}<\u002Fdiv>\n              <div style=\"{{ stage.tagStyle }}\">{{ stage.tag }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <!-- chasm separator -->\n        <div style=\"flex:0 0 84px;align-self:stretch;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:12px;gap:0\">\n          <div style=\"flex:1;width:2px;background:repeating-linear-gradient(to bottom,rgba(182,90,75,0.7) 0 7px,transparent 7px 14px);min-height:48px\"><\u002Fdiv>\n          <div style=\"background:rgba(182,90,75,0.12);border:1.5px solid rgba(182,90,75,0.5);border-radius:999px;padding:5px 10px;white-space:nowrap;font-family:var(--font-display);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#B65A4B;text-align:center;line-height:1.3\">Chasm™<\u002Fdiv>\n          <div style=\"flex:1;width:2px;background:repeating-linear-gradient(to bottom,rgba(182,90,75,0.7) 0 7px,transparent 7px 14px);min-height:48px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:2;position:relative;display:flex;justify-content:space-around;padding:0 4px\">\n          <div style=\"position:absolute;top:44px;left:0;right:11%;height:3px;background:linear-gradient(90deg,#7E5BC0,#3FD18B);z-index:0\"><\u002Fdiv>\n          <sc-for list=\"{{ journeyRight }}\" as=\"stage\" hint-placeholder-count=\"2\">\n            <div onclick=\"{{ stage.onSelect }}\" style=\"{{ stage.colStyle }}\">\n              <div style=\"height:88px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1\">\n                <div style=\"{{ stage.circleStyle }}\">{{ stage.num }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"{{ stage.nameStyle }}\">{{ stage.role }}<\u002Fdiv>\n              <div style=\"{{ stage.tagStyle }}\">{{ stage.tag }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n\n      <!-- detail panel -->\n      <div data-reveal=\"\" class=\"exp-detail-grid\" style=\"margin-top:46px;display:grid;grid-template-columns:300px 1fr;background:#fff;border-radius:var(--radius-lg);overflow:hidden;color:var(--text-body);box-shadow:0 8px 32px rgba(0,0,0,0.1)\">\n        <div style=\"background: radial-gradient(300px 200px at 70% 20%,rgba(74,58,106,0.5),transparent),linear-gradient(165deg,#2A1840,#423862); padding: 34px 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 30px; padding-bottom: 30px; padding-left: 30px; padding-right: 30px\">\n          <svg viewBox=\"0 0 120 120\" style=\"width:160px;height:160px;display:block\">\n            <sc-for list=\"{{ activeCluster.blue }}\" as=\"b\" hint-placeholder-count=\"5\">\n              <circle cx=\"{{ b.x }}\" cy=\"{{ b.y }}\" r=\"7\" fill=\"rgba(185,169,214,0.85)\"><\u002Fcircle>\n            <\u002Fsc-for>\n            <circle cx=\"{{ activeCluster.rx }}\" cy=\"{{ activeCluster.ry }}\" r=\"11\" fill=\"#B65A4B\"><\u002Fcircle>\n            <circle cx=\"{{ activeCluster.rx }}\" cy=\"{{ activeCluster.ry }}\" r=\"11\" fill=\"none\" stroke=\"#B65A4B\" stroke-width=\"2.5\" opacity=\"0.4\"><animate attributeName=\"r\" values=\"11;19;11\" dur=\"2.6s\" repeatCount=\"indefinite\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0.4;0;0.4\" dur=\"2.6s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:0.04em;color:#fff;margin-top:14px\">Stage {{ activeCluster.num }} of 6<\u002Fdiv>\n          <div style=\"font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px\">The red dot is you<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px 36px
